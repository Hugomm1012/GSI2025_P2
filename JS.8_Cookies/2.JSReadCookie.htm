	<script type="text/javascript">
	function verPreenche(campo){
//função para verificar se um dado campo de preenchimento obrigatorio está preenchido
		if (campo.value==null||campo.value==""){
//			alert("vazio");
			return false;
			}
//verifica-se se o campo está vazio ou se tem uma string nula
		else{
//			alert("preenchido");
			return true;
			}
	}

		function validarForm(formulario){
			var valido=true;
			var txtStatus="";
		if (verPreenche(formulario.nome)==false){
//o campo do nome não está preenchido, alerta-se o utilizador				
			formulario.nome.focus();
			document.getElementById('frmNome').style.color='red';
			txtStatus=txtStatus + "Nome nao esta preenchido<br>";
			valido=false;
			} else {
//o campo do nome está preenchido, repoem-se o formato original
			document.getElementById('frmNome').style.color='blue';
			}

		if (verPreenche(formulario.apelido)==false){
//o endereço de mail não está preenchido, alerta-se o utilizador				
			txtStatus=txtStatus + "Apelido nao esta preenchido<br>";
			document.getElementById('frmApelido').style.color='red';
			valido=false;
			} else {
//o endereço de mail está preenchido e é valido, repoem-se o formato original
			document.getElementById('frmApelido').style.color='blue';
			}
//a manipulação de conteudos via JavaScript permite a inclusão de tags de HTML
			document.getElementById('status').innerHTML=txtStatus;
			return valido;
		}

	function getCookie(name) {
	const enc = encodeURIComponent;
	const prefix = enc(name) + "=";
	return document.cookie
		.split(';')
		.map(c => c.trim())
		.filter(c => c.startsWith(prefix))
		.map(c => decodeURIComponent(c.substring(prefix.length)))[0] || null;
	}

	function checkCookie(formulario){
		nome=getCookie('nome');
		if (nome!=null && nome!=""){
			document.getElementById('nome').value=nome;
		} else {
			document.getElementById('nome').value="não há cookie";
		}
		
		apelido=getCookie('apelido');
		if (apelido!=null && apelido!=""){
			document.getElementById('apelido').value=apelido;
		} else {
			document.getElementById('apelido').value="não há cookie";
		}
	}
</script>
